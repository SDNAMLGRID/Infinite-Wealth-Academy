backend:
  name: git-gateway
  branch: main
  # Netlify Identity / Git Gateway (required for CMS to load)
  # Enable in Netlify: Identity → Enable Identity, then Services → Enable Git Gateway

media_folder: "public/uploads"
public_folder: "/uploads"

# So the CMS knows the site URL (can help with OAuth redirects)
site_url: https://tiny-fenglisu-8d7290.netlify.app
display_url: https://tiny-fenglisu-8d7290.netlify.app
locale: en

collections:
  - name: "blog"
    label: "Blog Posts"
    folder: "src/content/blog"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Publish Date", name: "date", widget: "datetime" }
      - { label: "Author", name: "author", widget: "string", default: "Koumba R Koundouno" }
      - { label: "Description", name: "description", widget: "text" }
      - { label: "Featured Image", name: "image", widget: "image", required: false }
      - { label: "Body", name: "body", widget: "markdown" }
